<!DOCTYPE html>
<html>
<head>
    <title>Weekly Report</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        h2 {
            background: #f2f2f2;
            padding: 10px;
            border-radius: 5px;
        }

        .user {
            margin-left: 20px;
            margin-top: 10px;
        }

        .task {
            margin-left: 40px;
            padding: 5px 0;
        }

        .status {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<h1>Manager Weekly Report</h1>

{% for date, users in grouped.items() %}

<details style="margin-bottom: 10px;">
    <summary style="font-size: 18px; font-weight: bold; cursor: pointer;">
        {{ date }}
    </summary>

    {% for user, tasks in users.items() %}
        <div class="user">
            <strong>{{ user }}</strong>

            {% for t in tasks %}
                <div class="task">
                    • {{ t.details }} ({{ t.status }})
                </div>
            {% endfor %}
        </div>
    {% endfor %}

</details>

{% endfor %}

</body>
</html>
