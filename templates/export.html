<!DOCTYPE html>
<html>
<head>
    <title>Weekly Manager Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f9f9f9;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        details {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        summary {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .user {
            margin-left: 20px;
            margin-top: 10px;
        }

        .task {
            margin-left: 40px;
            padding: 5px 0;
        }

        /* STATUS COLORS */
        .completed {
            color: green;
            font-weight: bold;
        }

        .in_progress {
            color: orange;
            font-weight: bold;
        }

        .not_started {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Manager Weekly Report</h1>

{% for date, users in grouped.items() %}

<details>
    <summary>{{ date }}</summary>

    {% for user, tasks in users.items() %}
        <div class="user">
            <strong>{{ user }}</strong>

            {% for t in tasks %}
                <div class="task">
                    • {{ t.details }} 
                    (<span class="{{ t.status }}">{{ t.status }}</span>)
                </div>
            {% endfor %}
        </div>
    {% endfor %}

</details>

{% endfor %}

</body>
</html>
