<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DSU Task Tracker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
          rel="stylesheet">

</head>

<body>

    <h1>📝 DSU Task Tracker</h1>

    <form method="POST"
          action="/add">

        <!-- TOP FORM -->
        <div class="top-form">

            <input type="text"
                   name="name"
                   placeholder="Employee Name"
                   required>

            <input type="date"
                   name="date"
                   required>

        </div>

        <!-- TASK GRID -->
        <div class="task-grid">

            <!-- RR -->
            <div class="task-entry-card">

                <h3>🟣 RR</h3>

                <div class="form-group">

                    <label>Details</label>

                    <textarea name="details1"></textarea>

                </div>

                <input type="hidden"
                       name="work_type1"
                       value="RR">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status1">

                        <option value="not_started">
                            Not Started
                        </option>

                        <option value="in_progress">
                            In Progress
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="po_assist">
                            PO Assist
                        </option>

                        <option value="sent_to_qa">
                            Sent To QA
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>TAT</label>

                    <input type="text"
                           name="tat1">

                </div>

                <div class="form-group">

                    <label>QA</label>

                    <input type="text"
                           name="qa1">

                </div>

                <div class="form-group">

                    <label>Others</label>

                    <input type="text"
                           name="others1">

                </div>

            </div>

            <!-- RMR LOGICAL -->
            <div class="task-entry-card">

                <h3>🔵 RMR Logical</h3>

                <div class="form-group">

                    <label>Details</label>

                    <textarea name="details2"></textarea>

                </div>

                <input type="hidden"
                       name="work_type2"
                       value="RMR Logical">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status2">

                        <option value="not_started">
                            Not Started
                        </option>

                        <option value="in_progress">
                            In Progress
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="po_assist">
                            PO Assist
                        </option>

                        <option value="sent_to_qa">
                            Sent To QA
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>TAT</label>

                    <input type="text"
                           name="tat2">

                </div>

                <div class="form-group">

                    <label>QA</label>

                    <input type="text"
                           name="qa2">

                </div>

                <div class="form-group">

                    <label>Others</label>

                    <input type="text"
                           name="others2">

                </div>

            </div>

            <!-- RMR EDITORIAL -->
            <div class="task-entry-card">

                <h3>🟢 RMR Editorial</h3>

                <div class="form-group">

                    <label>Details</label>

                    <textarea name="details3"></textarea>

                </div>

                <input type="hidden"
                       name="work_type3"
                       value="RMR Editorial">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status3">

                        <option value="not_started">
                            Not Started
                        </option>

                        <option value="in_progress">
                            In Progress
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="po_assist">
                            PO Assist
                        </option>

                        <option value="sent_to_qa">
                            Sent To QA
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>TAT</label>

                    <input type="text"
                           name="tat3">

                </div>

                <div class="form-group">

                    <label>QA</label>

                    <input type="text"
                           name="qa3">

                </div>

                <div class="form-group">

                    <label>Others</label>

                    <input type="text"
                           name="others3">

                </div>

            </div>

            <!-- IU -->
            <div class="task-entry-card">

                <h3>🟠 IU</h3>

                <div class="form-group">

                    <label>Details</label>

                    <textarea name="details4"></textarea>

                </div>

                <input type="hidden"
                       name="work_type4"
                       value="IU">

                <div class="form-group">

                    <label>Status</label>

                    <select name="status4">

                        <option value="not_started">
                            Not Started
                        </option>

                        <option value="in_progress">
                            In Progress
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="po_assist">
                            PO Assist
                        </option>

                        <option value="sent_to_qa">
                            Sent To QA
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>TAT</label>

                    <input type="text"
                           name="tat4">

                </div>

                <div class="form-group">

                    <label>QA</label>

                    <input type="text"
                           name="qa4">

                </div>

                <div class="form-group">

                    <label>Others</label>

                    <input type="text"
                           name="others4">

                </div>

            </div>

        </div>

        <!-- SUBMIT -->
        <div class="submit-wrapper">

            <button type="submit">
                🚀 Submit Tasks
            </button>

        </div>

    </form>

</body>

</html>
