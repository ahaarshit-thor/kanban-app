<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DSU Task Tracker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
          rel="stylesheet">

</head>

<body>

    <h1>📝 DSU Task Tracker</h1>

    <form method="POST"
          action="/add">

        <!-- TOP FORM -->
        <div class="top-form">

            <input type="text"
                   name="name"
                   placeholder="Employee Name"
                   required>

            <input type="date"
                   name="date"
                   required>

        </div>

        <!-- TASK GRID -->
        <div class="task-grid">

            {% for task in task_types %}

            <div class="task-entry-card">

                <h3>{{ task }}</h3>

                <!-- DETAILS -->
                <div class="form-group">

                    <label>Details</label>

                    <textarea name="details{{ loop.index }}"></textarea>

                </div>

                <!-- WORK TYPE -->
                <input type="hidden"
                       name="work_type{{ loop.index }}"
                       value="{{ task }}">

                <!-- STATUS -->
                <div class="form-group">

                    <label>Status</label>

                    <select name="status{{ loop.index }}"
                            class="status-dropdown status-not_started"
                            onchange="updateStatusColor(this)">

                        <option value="not_started">
                            Not Started
                        </option>

                        <option value="in_progress">
                            In Progress
                        </option>

                        <option value="completed">
                            Completed
                        </option>

                        <option value="po_assist">
                            PO Assist
                        </option>

                        <option value="sent_to_qa">
                            Sent To QA
                        </option>

                    </select>

                </div>

                <!-- TAT -->
                <div class="form-group">

                    <label>TAT</label>

                    <input type="text"
                           name="tat{{ loop.index }}">

                </div>

                <!-- QA -->
                <div class="form-group">

                    <label>QA</label>

                    <input type="text"
                           name="qa{{ loop.index }}">

                </div>

                <!-- OTHERS -->
                <div class="form-group">

                    <label>Others</label>

                    <input type="text"
                           name="others{{ loop.index }}">

                </div>

            </div>

            {% endfor %}

        </div>

        <!-- SUBMIT -->
        <div class="submit-wrapper">

            <button type="submit">
                🚀 Submit Tasks
            </button>

        </div>

    </form>
<script>

function updateStatusColor(el) {

    el.classList.remove(
        "status-not_started",
        "status-in_progress",
        "status-completed",
        "status-po_assist",
        "status-sent_to_qa"
    );

    el.classList.add(
        "status-" + el.value
    );

}

</script>
</body>

</html>
